apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: '{{ include "api-syncagent.fullname" . }}:leaderelection'
  namespace: {{ include "api-syncagent.namespace" . }}
rules:
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "api-syncagent.fullname" . }}:{{ include "api-syncagent.serviceAccountName" . }}:leaderelection
  namespace: {{ include "api-syncagent.namespace" . }}
  labels:
    {{- include "api-syncagent.labels" . | nindent 4 }}
  annotations:
    {{- .Values.annotations | toYaml | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "api-syncagent.fullname" . }}:leaderelection
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    name: {{ include "api-syncagent.serviceAccountName" . }}
    namespace: {{ include "api-syncagent.namespace" . }}

---
# A dedicated role and binding just to allow the agent to publish events on PublishedResources,
# which are cluster-scoped and so use default (by default) as their events namespace. Even though
# it might be technically possible to store events for cluster-scoped objects in a different
# namespace, `kubectl describe` will always use "default" when describing such objects, even if you
# ran it with `kubectl -n ... describe`.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: '{{ template "api-syncagent.fullname" . }}:{{ .Release.Namespace }}:events'
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: '{{ include "api-syncagent.fullname" . }}:{{ .Release.Namespace }}:events'
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    name: {{ include "api-syncagent.serviceAccountName" . }}
    namespace: {{ include "api-syncagent.namespace" . }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: '{{ include "api-syncagent.fullname" . }}:{{ .Release.Namespace }}:events'
  namespace: default
rules:
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - update
      - patch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: '{{ include "api-syncagent.fullname" . }}:{{ .Release.Namespace }}'
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
      - create
      - update
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - list
      - watch
      - create
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - syncagent.kcp.io
    resources:
      - publishedresources
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - syncagent.kcp.io
    resources:
      - publishedresources/status
    verbs:
      - create
      - get
      - update
      - patch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: '{{ template "api-syncagent.fullname" . }}:{{ .Release.Namespace }}'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: '{{ include "api-syncagent.fullname" . }}:{{ .Release.Namespace }}'
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    name: {{ include "api-syncagent.serviceAccountName" . }}
    namespace: {{ include "api-syncagent.namespace" . }}
